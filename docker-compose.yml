version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: mysql-event
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: event_booking
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: event-booking-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: event_booking
      PORT: 3000
    depends_on:
      - mysql

volumes:
  mysql_data: